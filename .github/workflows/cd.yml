name: CD Pipeline

on:
  release:
    types: [ published ]

jobs:
  publish:
    name: Package and Publish to VS Code Marketplace
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js 24.x
      uses: actions/setup-node@v4
      with:
        node-version: '24.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Run lint
      run: npm run lint

    - name: Run unit tests
      run: npm run test:coverage

    - name: Build extension and MCP server bundles
      run: npm run package

    - name: Install vsce
      run: npm install -g @vscode/vsce

    - name: Package .vsix
      run: vsce package

    - name: Publish to VS Code Marketplace
      run: vsce publish
      env:
        VSCE_PAT: ${{ secrets.VSCE_PAT }}
